services:
  - type: web
    name: anatomy-portal
    runtime: node
    buildCommand: npm install && npm run build:node
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NITRO_PRESET
        value: node-server
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
